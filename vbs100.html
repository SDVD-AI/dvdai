<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VBS://100 — מאגר פקודות האקר</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#020c02;
  --bg2:#041204;
  --green:#00ff41;
  --green2:#00cc33;
  --green3:#004d14;
  --blue:#00e5ff;
  --yellow:#ffe600;
  --red:#ff3c3c;
  --text:#b8ffcc;
  --dim:#4a7a57;
  --card:#060e06;
  --border:#00ff4120;
  --border-h:#00ff4170;
  --mono:'Share Tech Mono',monospace;
  --body:'Rubik',sans-serif;
  --glow:0 0 12px #00ff4188;
  --glow2:0 0 24px #00ff4144;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  min-height:100vh;
  overflow-x:hidden;
  cursor:crosshair;
}

/* ── MATRIX CANVAS ── */
#matrix{
  position:fixed;inset:0;z-index:0;
  opacity:0;pointer-events:none;
  transition:opacity .8s;
}
body.hacker-mode #matrix{opacity:.13}

/* ── SCANLINES ── */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
  pointer-events:none;z-index:9999;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:500;
  background:rgba(2,12,2,.97);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
  padding:.7rem 1.5rem;
}
.header-inner{
  max-width:1400px;margin:auto;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
.logo{
  font-family:var(--mono);font-size:1.3rem;
  color:var(--green);text-shadow:var(--glow);
  letter-spacing:2px;white-space:nowrap;flex-shrink:0;
}
.logo span{color:var(--blue)}
.logo em{color:var(--dim);font-style:normal}

.search-wrap{
  flex:1;min-width:200px;position:relative;
}
.search-wrap::before{
  content:'⌕';position:absolute;right:.9rem;top:50%;
  transform:translateY(-50%);color:var(--dim);
  font-size:1.1rem;pointer-events:none;
}
#search{
  width:100%;background:#050f05;
  border:1px solid var(--border);
  border-radius:6px;padding:.55rem 2.4rem .55rem .9rem;
  color:var(--green);font-family:var(--mono);font-size:.9rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
  direction:rtl;
}
#search:focus{border-color:var(--green2);box-shadow:var(--glow2)}
#search::placeholder{color:var(--dim)}

.header-controls{display:flex;gap:.6rem;align-items:center;flex-shrink:0}

.cat-filter{display:flex;gap:.4rem;flex-wrap:wrap}
.cat-btn{
  font-family:var(--mono);font-size:.7rem;
  color:var(--dim);background:transparent;
  border:1px solid #1a3a1a;border-radius:4px;
  padding:.3rem .65rem;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.cat-btn:hover,.cat-btn.active{
  color:var(--green);border-color:var(--green2);
  text-shadow:0 0 6px var(--green);
  background:rgba(0,255,65,.06);
}

/* ── HACKER MODE BTN ── */
#hackerBtn{
  font-family:var(--mono);font-size:.78rem;
  color:var(--bg);background:var(--green2);
  border:none;border-radius:5px;
  padding:.45rem 1rem;cursor:pointer;
  letter-spacing:1px;font-weight:700;
  box-shadow:0 0 12px #00cc3355;
  transition:all .25s;white-space:nowrap;
}
#hackerBtn:hover{background:var(--green);box-shadow:0 0 22px #00ff4177}
body.hacker-mode #hackerBtn{
  background:var(--red);box-shadow:0 0 14px #ff3c3c66;
  color:#fff;
}

/* ── HERO STRIP ── */
.hero{
  position:relative;z-index:10;
  max-width:1400px;margin:0 auto;
  padding:2.5rem 1.5rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
  border-bottom:1px solid var(--border);
}
.hero-left h1{
  font-size:clamp(1.6rem,3.5vw,2.4rem);
  font-weight:900;color:var(--green);
  text-shadow:0 0 20px #00ff4155;
  line-height:1.15;
}
.hero-left h1 span{color:var(--blue);text-shadow:0 0 20px #00e5ff55}
.hero-sub{
  font-family:var(--mono);font-size:.78rem;
  color:var(--dim);margin-top:.4rem;letter-spacing:.5px;
}
.stats{display:flex;gap:1.5rem;flex-wrap:wrap}
.stat-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:.7rem 1.1rem;text-align:center;
  font-family:var(--mono);
}
.stat-num{display:block;font-size:1.6rem;color:var(--green);text-shadow:var(--glow);line-height:1}
.stat-lbl{font-size:.65rem;color:var(--dim);letter-spacing:1px}

/* ── GRID ── */
.main{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:1.5rem}

#counter{
  font-family:var(--mono);font-size:.75rem;
  color:var(--dim);margin-bottom:1rem;
  padding-bottom:.75rem;border-bottom:1px solid var(--border);
}
#counter span{color:var(--green)}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:1rem;
}

/* ── CARD ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  display:flex;flex-direction:column;
  position:relative;
  transition:border-color .25s,box-shadow .25s,transform .25s;
  animation:fadeIn .35s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card::before{
  content:'';position:absolute;
  top:0;right:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--green),transparent);
  opacity:.4;transition:opacity .25s;
}
.card:hover{
  border-color:var(--green2);
  box-shadow:0 0 0 1px #00ff4118,0 0 20px #00ff4120,0 8px 32px rgba(0,255,65,.1);
  transform:translateY(-3px);
}
.card:hover::before{opacity:1}

.card-header{
  padding:.75rem 1rem;
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:.5rem;border-bottom:1px solid var(--border);
  background:#040d04;
}
.card-num{
  font-family:var(--mono);font-size:.65rem;
  color:var(--dim);letter-spacing:1px;
  flex-shrink:0;margin-top:2px;
}
.card-title{
  font-weight:700;font-size:.9rem;
  color:var(--blue);flex:1;
  text-shadow:0 0 8px rgba(0,229,255,.25);
}
.cat-tag{
  font-family:var(--mono);font-size:.6rem;
  padding:.2rem .5rem;border-radius:3px;
  border:1px solid;flex-shrink:0;
}
.cat-tag.msg   {color:#ffe600;border-color:#ffe60040;background:#ffe6000a}
.cat-tag.voice {color:#ff9f43;border-color:#ff9f4340;background:#ff9f430a}
.cat-tag.shell {color:#ff6b9d;border-color:#ff6b9d40;background:#ff6b9d0a}
.cat-tag.file  {color:#00e5ff;border-color:#00e5ff40;background:#00e5ff0a}
.cat-tag.sys   {color:#a29bfe;border-color:#a29bfe40;background:#a29bfe0a}
.cat-tag.str   {color:#55efc4;border-color:#55efc440;background:#55efc40a}
.cat-tag.math  {color:#fd79a8;border-color:#fd79a840;background:#fd79a80a}
.cat-tag.date  {color:#00cec9;border-color:#00cec940;background:#00cec90a}
.cat-tag.input {color:#74b9ff;border-color:#74b9ff40;background:#74b9ff0a}
.cat-tag.loop  {color:#00ff41;border-color:#00ff4140;background:#00ff410a}

.card-desc{
  padding:.65rem 1rem;
  font-size:.82rem;color:var(--dim);
  line-height:1.6;flex:1;
}

.card-code-wrap{position:relative}
.card pre{
  background:#030a03;
  font-family:var(--mono);font-size:.78rem;
  color:var(--green);padding:.9rem 1rem;
  overflow-x:auto;line-height:1.7;
  text-shadow:0 0 4px rgba(0,255,65,.2);
  direction:ltr;text-align:left;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  max-height:160px;overflow-y:auto;
}
.card pre::-webkit-scrollbar{width:4px;height:4px}
.card pre::-webkit-scrollbar-track{background:transparent}
.card pre::-webkit-scrollbar-thumb{background:var(--green3);border-radius:2px}

.card-footer{
  padding:.5rem .75rem;
  display:flex;align-items:center;justify-content:flex-end;
  background:#040d04;
}
.copy-btn{
  font-family:var(--mono);font-size:.7rem;
  color:var(--green2);background:transparent;
  border:1px solid var(--green3);
  border-radius:4px;padding:.25rem .75rem;
  cursor:pointer;transition:all .2s;
  letter-spacing:.5px;
}
.copy-btn:hover{background:var(--green);color:var(--bg);border-color:var(--green);box-shadow:0 0 10px #00ff4155}
.copy-btn.ok{background:var(--green);color:var(--bg);border-color:var(--green)}

/* ── NO RESULTS ── */
.no-results{
  grid-column:1/-1;text-align:center;
  font-family:var(--mono);color:var(--dim);
  padding:4rem;font-size:.9rem;
}
.no-results span{color:var(--green);display:block;font-size:2rem;margin-bottom:.5rem}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;
  border-top:1px solid var(--border);
  padding:1.5rem;text-align:center;
  font-family:var(--mono);font-size:.7rem;color:var(--dim);
}
footer b{color:var(--green);text-shadow:0 0 6px var(--green)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .hero-left h1{font-size:1.4rem}
  .cat-filter{display:none}
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">VBS<span>://</span><em>100</em></div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="חפש פקודה, תיאור או קוד..." autocomplete="off"/>
    </div>
    <div class="cat-filter" id="catFilter"></div>
    <div class="header-controls">
      <button id="hackerBtn" onclick="toggleHacker()">⚡ מצב האקר</button>
    </div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-left">
    <h1>100 פקודות <span>VBScript</span><br/>למתכנת האמיתי</h1>
    <div class="hero-sub">> מאגר מלא · חיפוש חי · כפתור העתקה · מצב האקר_</div>
  </div>
  <div class="stats">
    <div class="stat-box"><span class="stat-num" id="totalStat">100</span><span class="stat-lbl">פקודות</span></div>
    <div class="stat-box"><span class="stat-num" id="visibleStat">100</span><span class="stat-lbl">מוצגות</span></div>
    <div class="stat-box"><span class="stat-num">10</span><span class="stat-lbl">קטגוריות</span></div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main">
  <div id="counter">מציג <span id="cnt">100</span> מתוך 100 פקודות</div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  <b>VBS://100</b> — מאגר פקודות VBScript · כתוב עם ❤️ ו-00ff41 · root@hacker:~$_
</footer>

<script>
// ═══════════════════════════════════════════════
// DATA — 100 unique VBScript commands
// ═══════════════════════════════════════════════
const CMDS=[
// ── הודעות (msg) ──
{t:"הודעה פשוטה",d:"מציג חלון הודעה בסיסי על המסך",c:`MsgBox "שלום עולם!"`,cat:"msg"},
{t:"הודעה עם כותרת",d:"מציג הודעה עם כותרת מותאמת אישית",c:`MsgBox "אני לומד VBS!", 0, "כותרת מגניבה"`,cat:"msg"},
{t:"הודעת שאלה כן/לא",d:"מציג חלון עם כפתורי כן ולא",c:`MsgBox "האם להמשיך?", 4, "שאלה"`,cat:"msg"},
{t:"הודעה עם סמל אזהרה",d:"מציג הודעה עם אייקון אזהרה צהוב",c:`MsgBox "זהירות!", 48, "אזהרה"`,cat:"msg"},
{t:"הודעה עם סמל שגיאה",d:"מציג הודעה עם סמל X אדום",c:`MsgBox "שגיאה!", 16, "Error"`,cat:"msg"},
{t:"הודעה עם סמל שאלה",d:"מציג הודעה עם סימן שאלה",c:`MsgBox "בטוח?", 32, "?"`,cat:"msg"},
{t:"הודעת OK+Cancel",d:"מציג הודעה עם כפתורי אישור וביטול",c:`Dim r\nr = MsgBox("להמשיך?", 1, "בחר")\nIf r = 1 Then MsgBox "לחצת אישור!"`,cat:"msg"},
{t:"שמירת תשובה מ-MsgBox",d:"שומר את בחירת המשתמש במשתנה",c:`Dim ans\nans = MsgBox("כן או לא?", 4, "שאלה")\nIf ans = 6 Then MsgBox "בחרת כן!"\nIf ans = 7 Then MsgBox "בחרת לא!"`,cat:"msg"},
{t:"רצף הודעות",d:"מציג מספר הודעות אחת אחרי השנייה",c:`MsgBox "הודעה 1"\nMsgBox "הודעה 2"\nMsgBox "הודעה 3"`,cat:"msg"},
{t:"הודעה עם משתנה",d:"משלב משתנה בתוך טקסט ההודעה",c:`Dim shem\nshem = "האקר"\nMsgBox "שלום, " & shem & "!"`,cat:"msg"},

// ── קלט (input) ──
{t:"InputBox פשוט",d:"מבקש קלט טקסט מהמשתמש",c:`Dim name\nname = InputBox("מה שמך?")\nMsgBox "שלום, " & name`,cat:"input"},
{t:"InputBox עם כותרת",d:"חלון קלט עם כותרת וערך ברירת מחדל",c:`Dim age\nage = InputBox("מה גילך?", "גיל", "11")\nMsgBox "גילך: " & age`,cat:"input"},
{t:"קלט מספר וחישוב",d:"מקבל מספר ומחשב את כפולתו",c:`Dim n\nn = InputBox("הכנס מספר:")\nMsgBox "כפול שניים = " & n*2`,cat:"input"},
{t:"אימות קלט ריק",d:"בודק אם המשתמש השאיר את השדה ריק",c:`Dim x\nx = InputBox("הכנס משהו:")\nIf x = "" Then\n  MsgBox "לא הכנסת כלום!"\nElse\n  MsgBox "הכנסת: " & x\nEnd If`,cat:"input"},
{t:"סיסמה פשוטה",d:"בודק אם המשתמש הכניס את הסיסמה הנכונה",c:`Dim pass\npass = InputBox("הכנס סיסמה:")\nIf pass = "1234" Then\n  MsgBox "ברוך הבא!"\nElse\n  MsgBox "סיסמה שגויה!"\nEnd If`,cat:"input"},

// ── דיבור (voice) ──
{t:"קול בסיסי",d:"גורם למחשב לדבר באנגלית",c:`Dim v\nSet v = CreateObject("SAPI.SpVoice")\nv.Speak "Hello, I am your computer!"`,cat:"voice"},
{t:"מהירות דיבור",d:"שינוי מהירות הדיבור (Rate)",c:`Dim v\nSet v = CreateObject("SAPI.SpVoice")\nv.Rate = -5\nv.Speak "I speak slowly now..."`,cat:"voice"},
{t:"עוצמת קול",d:"שינוי ווליום הדיבור (0-100)",c:`Dim v\nSet v = CreateObject("SAPI.SpVoice")\nv.Volume = 50\nv.Speak "Half volume!"`,cat:"voice"},
{t:"שמות רשימת קולות",d:"מדפיס את כל הקולות הזמינים במערכת",c:`Dim v, voices\nSet v = CreateObject("SAPI.SpVoice")\nDim s: s = ""\nFor Each voice In v.GetVoices\n  s = s & voice.GetDescription & Chr(10)\nNext\nMsgBox s`,cat:"voice"},
{t:"קול מהיר מאוד",d:"דיבור בסרט מאוד מהיר",c:`Dim v\nSet v = CreateObject("SAPI.SpVoice")\nv.Rate = 10\nv.Speak "Super fast speaking mode activated!"`,cat:"voice"},
{t:"ספירה לאחור קולית",d:"ספירה לאחור מ-5 עם קול",c:`Dim v, i\nSet v = CreateObject("SAPI.SpVoice")\nFor i = 5 To 1 Step -1\n  v.Speak CStr(i)\n  WScript.Sleep 800\nNext\nv.Speak "Blast off!"`,cat:"voice"},
{t:"קול ושיגור תוכנה",d:"מדבר ואז פותח תוכנה",c:`Dim v\nSet v = CreateObject("SAPI.SpVoice")\nv.Speak "Opening calculator!"\nDim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "calc.exe"`,cat:"voice"},
{t:"שאלה קולית",d:"מבקש שם ומדבר אותו בקול",c:`Dim v, nm\nSet v = CreateObject("SAPI.SpVoice")\nnm = InputBox("What is your name?")\nv.Speak "Hello " & nm & " welcome to hacker school"`,cat:"voice"},

// ── של / הפעלת תוכנות (shell) ──
{t:"פתיחת מחשבון",d:"פותח את מחשבון Windows",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "calc.exe"`,cat:"shell"},
{t:"פתיחת פנקס רשימות",d:"פותח Notepad",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "notepad.exe"`,cat:"shell"},
{t:"פתיחת ציור",d:"פותח את תוכנת Paint",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "mspaint.exe"`,cat:"shell"},
{t:"פתיחת CMD",d:"פותח שורת פקודה",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "cmd.exe"`,cat:"shell"},
{t:"פתיחת אתר",d:"פותח אתר אינטרנט בדפדפן",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "https://www.google.com"`,cat:"shell"},
{t:"פתיחת סייר הקבצים",d:"פותח את Windows Explorer",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "explorer.exe"`,cat:"shell"},
{t:"הצגת תיקייה ספציפית",d:"פותח תיקייה ספציפית בסייר",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "explorer.exe C:\\Users"`,cat:"shell"},
{t:"הפעלה בטרמינל",d:"מריץ פקודה ב-cmd ומחכה לסיום",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "cmd /c echo Done!", 1, True`,cat:"shell"},
{t:"השתקת הצלילים",d:"מפעיל פקודת mute דרך taskkill",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "nircmd mutesysvolume 1"`,cat:"shell"},
{t:"כיבוי תוכנה",d:"סוגר תוכנה לפי שם תהליך",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "taskkill /F /IM notepad.exe", 0`,cat:"shell"},
{t:"פתיחת הגדרות",d:"פותח את הגדרות Windows",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "ms-settings:"`,cat:"shell"},
{t:"פתיחת מנהל המשימות",d:"מפעיל Task Manager",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "taskmgr.exe"`,cat:"shell"},
{t:"שינוי wallpaper",d:"מחליף את תמונת הרקע של שולחן העבודה",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.RegWrite "HKCU\\Control Panel\\Desktop\\Wallpaper", "C:\\path\\image.jpg"\nsh.Run "RUNDLL32.EXE user32.dll,UpdatePerUserSystemParameters"`,cat:"shell"},
{t:"הפעלה מושהית",d:"מחכה 3 שניות ואז פותח תוכנה",c:`WScript.Sleep 3000\nDim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "calc.exe"`,cat:"shell"},
{t:"פתיחת 3 תוכנות",d:"פותח מחשבון, ציור ופנקס יחד",c:`Dim sh\nSet sh = CreateObject("WScript.Shell")\nsh.Run "calc.exe"\nsh.Run "mspaint.exe"\nsh.Run "notepad.exe"`,cat:"shell"},

// ── קבצים (file) ──
{t:"יצירת קובץ טקסט",d:"יוצר קובץ *.txt ומכניס טקסט",c:`Dim fso, f\nSet fso = CreateObject("Scripting.FileSystemObject")\nSet f = fso.CreateTextFile("C:\\test.txt", True)\nf.Write "שלום מה שלומך!"\nf.Close`,cat:"file"},
{t:"קריאת קובץ",d:"קורא קובץ טקסט ומציג את תוכנו",c:`Dim fso, f\nSet fso = CreateObject("Scripting.FileSystemObject")\nSet f = fso.OpenTextFile("C:\\test.txt", 1)\nMsgBox f.ReadAll\nf.Close`,cat:"file"},

// CATEGORIES CONFIG
// ═══════════════════════════════════════════════
const CATS={
  all:{label:"הכל",color:"#00ff41"},
  msg:{label:"הודעות",color:"#ffe600"},
  input:{label:"קלט",color:"#74b9ff"},
  voice:{label:"דיבור",color:"#ff9f43"},
  shell:{label:"Shell",color:"#ff6b9d"},
  file:{label:"קבצים",color:"#00e5ff"},
  str:{label:"מחרוזות",color:"#55efc4"},
  math:{label:"מתמטיקה",color:"#fd79a8"},
  date:{label:"תאריך",color:"#00cec9"},
  sys:{label:"מערכת",color:"#a29bfe"},
  loop:{label:"לולאות",color:"#00ff41"},
}

// ═══════════════════════════════════════════════
// BUILD CATEGORY FILTER
// ═══════════════════════════════════════════════
let activecat="all"
const catWrap=document.getElementById("catFilter")
Object.entries(CATS).forEach(([k,v])=>{
  const b=document.createElement("button")
  b.className="cat-btn"+(k==="all"?" active":"")
  b.textContent=v.label
  b.dataset.cat=k
  b.onclick=()=>{
    activecat=k
    document.querySelectorAll(".cat-btn").forEach(x=>x.classList.remove("active"))
    b.classList.add("active")
    renderGrid()
  }
  catWrap.appendChild(b)
})

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
const grid=document.getElementById("grid")
const cnt=document.getElementById("cnt")
const vis=document.getElementById("visibleStat")
let searchVal=""

document.getElementById("search").addEventListener("input",e=>{
  searchVal=e.target.value.trim().toLowerCase()
  renderGrid()
})

function renderGrid(){
  const q=searchVal
  const filtered=CMDS.filter((c,i)=>{
    const catOk=activecat==="all"||c.cat===activecat
    const searchOk=!q||
      c.t.toLowerCase().includes(q)||
      c.d.toLowerCase().includes(q)||
      c.c.toLowerCase().includes(q)||
      c.cat.toLowerCase().includes(q)
    return catOk&&searchOk
  })

  cnt.textContent=filtered.length
  vis.textContent=filtered.length

  if(!filtered.length){
    grid.innerHTML=`<div class="no-results"><span>¯\\_(ツ)_/¯</span>לא נמצאו פקודות לחיפוש הזה</div>`
    return
  }

  grid.innerHTML=filtered.map((c,idx)=>{
    const num=String(CMDS.indexOf(c)+1).padStart(3,"0")
    const escaped=c.c.replace(/</g,"&lt;").replace(/>/g,"&gt;")
    return`<div class="card" style="animation-delay:${idx*0.03}s">
  <div class="card-header">
    <div class="card-num">#${num}</div>
    <div class="card-title">${c.t}</div>
    <div class="cat-tag ${c.cat}">${CATS[c.cat]?.label||c.cat}</div>
  </div>
  <div class="card-desc">${c.d}</div>
  <div class="card-code-wrap">
    <pre>${escaped}</pre>
  </div>
  <div class="card-footer">
    <button class="copy-btn" onclick="copyCode(this,'${encodeURIComponent(c.c)}')">⎘ העתק</button>
  </div>
</div>`
  }).join("")
}

function copyCode(btn,encoded){
  const code=decodeURIComponent(encoded)
  navigator.clipboard.writeText(code).catch(()=>{
    const ta=document.createElement("textarea")
    ta.value=code
    document.body.appendChild(ta)
    ta.select()
    document.execCommand("copy")
    document.body.removeChild(ta)
  })
  btn.textContent="✓ הועתק!"
  btn.classList.add("ok")
  setTimeout(()=>{btn.textContent="⎘ העתק";btn.classList.remove("ok")},2000)
}

renderGrid()

// ═══════════════════════════════════════════════
// MATRIX EFFECT
// ═══════════════════════════════════════════════
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")
let matrixOn=false,matrixRAF=null

function resizeMatrix(){
  canvas.width=window.innerWidth
  canvas.height=window.innerHeight
}
resizeMatrix()
window.addEventListener("resize",resizeMatrix)

const CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>/\\アイウエオVBSCRIPT"
let drops=[]

function initDrops(){
  const cols=Math.floor(canvas.width/16)
  drops=Array(cols).fill(1)
}
initDrops()

function drawMatrix(){
  ctx.fillStyle="rgba(2,12,2,0.05)"
  ctx.fillRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle="#00ff41"
  ctx.font="14px Share Tech Mono,monospace"
  for(let i=0;i<drops.length;i++){
    const ch=CHARS[Math.floor(Math.random()*CHARS.length)]
    ctx.fillText(ch,i*16,drops[i]*16)
    if(drops[i]*16>canvas.height&&Math.random()>.975)drops[i]=0
    drops[i]++
  }
  if(matrixOn)matrixRAF=requestAnimationFrame(drawMatrix)
}

function toggleHacker(){
  matrixOn=!matrixOn
  const btn=document.getElementById("hackerBtn")
  if(matrixOn){
    document.body.classList.add("hacker-mode")
    btn.textContent="☠ כבה מצב האקר"
    initDrops()
    drawMatrix()
  }else{
    document.body.classList.remove("hacker-mode")
    btn.textContent="⚡ מצב האקר"
    cancelAnimationFrame(matrixRAF)
    ctx.clearRect(0,0,canvas.width,canvas.height)
  }
}
